global:
  scrape_interval: 15s      # every 15s collection 
  evaluation_interval: 15s  # every 15s evaluate alert rules每

scrape_configs:
  # Collect Prometheus self metric
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Collect Node Exporter host metric
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Collect demo app metric
  - job_name: 'demo-app'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/metrics'
